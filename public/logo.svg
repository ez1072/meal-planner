<svg width="48" height="48" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="48" height="48" rx="12" fill="#E07B39"/>

  <!-- Fork: three tines -->
  <rect x="12.5" y="9" width="2" height="11" rx="1" fill="white"/>
  <rect x="16.5" y="9" width="2" height="11" rx="1" fill="white"/>
  <rect x="20.5" y="9" width="2" height="11" rx="1" fill="white"/>
  <!-- Fork neck curves tines into handle -->
  <path d="M12.5 20 C12.5 24 15 25.5 17.5 25.5 C20 25.5 22.5 24 22.5 20"
        stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Fork handle -->
  <line x1="17.5" y1="25.5" x2="17.5" y2="39"
        stroke="white" stroke-width="2" stroke-linecap="round"/>

  <!-- Herb sprig: stem -->
  <line x1="31" y1="11" x2="31" y2="39"
        stroke="white" stroke-width="2" stroke-linecap="round"/>
  <!-- Left leaf -->
  <path d="M31 27 Q24 23 25.5 16 Q31 20.5 31 27Z" fill="white"/>
  <!-- Right leaf -->
  <path d="M31 20 Q38 16 36.5 9 Q31 13.5 31 20Z" fill="white"/>
</svg>
